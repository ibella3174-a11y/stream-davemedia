<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream | Create Account</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #05070a;
      --card: #111418;
      --accent: #4fd1c5;         
      --text: #ffffff;
      --text-dim: #94a3b8;
      --input-bg: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --error: #ff5f5f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      background-image: radial-gradient(circle at 50% 0%, rgba(79, 209, 197, 0.1), transparent 50%);
    }

    .reg-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .header { text-align: center; margin-bottom: 30px; }
    
    /* YOUR LOGO BACK IN ACTION */
    .logo { width: 100px; margin-bottom: 15px; filter: drop-shadow(0 0 8px var()); }
    
    h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; }
    p.subtitle { color: var(--text-dim); font-size: 14px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .full-width { grid-column: span 2; }

    label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }

    .input-wrapper { position: relative; margin-bottom: 18px; }
    
    input, select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: #fff;
      font-size: 15px;
      transition: all 0.2s ease;
    }

    /* Error State Styling */
    input.invalid { border-color: var(--error) !important; background: rgba(255, 95, 95, 0.05); }

    input:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.05); }

    .toggle-pass { position: absolute; right: 14px; top: 36px; color: var(--text-dim); cursor: pointer; }

    .error-msg { color: var(--error); font-size: 11px; font-weight: 600; margin-top: 4px; display: none; }

    /* Plan Visualizer */
    .plan-badge {
      background: rgba(79, 209, 197, 0.05);
      border: 1px solid rgba(79, 209, 197, 0.2);
      padding: 15px;
      border-radius: 16px;
      margin: 10px 0 25px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plan-info h4 { font-size: 14px; color: var(--accent); }
    .savings-tag { background: var(--accent); color: #000; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 6px; }

    .btn-submit {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: var(--accent);
      color: #000;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-submit:hover { transform: translateY(-2px); opacity: 0.9; }

    .footer-links { text-align: center; margin-top: 25px; font-size: 14px; }
    .footer-links a { color: var(--accent); text-decoration: none; font-weight: 700; }
  </style>
</head>

<body>
  <div class="reg-card">
    <div class="header">
      <img src="logo.png" alt="Stream Logo" class="logo">
      <h2>Create Account</h2>
     <p class="subtitle">Your journey to financial freedom starts with one click.</p>
    </div>

    <form id="regForm" novalidate>
      <div class="form-grid">
        <div class="input-wrapper full-width">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter full name">
          <div class="error-msg" id="errName"><i class="fa-solid fa-circle-exclamation"></i> Full name is required</div>
        </div>

        <div class="input-wrapper">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose username">
          <div class="error-msg" id="errUser"><i class="fa-solid fa-circle-exclamation"></i> Required</div>
        </div>

        <div class="input-wrapper">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="08123456789">
          <div class="error-msg" id="errPhone"><i class="fa-solid fa-circle-exclamation"></i> Invalid phone</div>
        </div>

        <div class="input-wrapper full-width">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="email@example.com">
          <div class="error-msg" id="errEmail"><i class="fa-solid fa-circle-exclamation"></i> Valid email required</div>
        </div>

        <div class="input-wrapper full-width">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters">
          <span class="toggle-pass" id="togglePass"><i class="fa-solid fa-eye-slash"></i></span>
          <div class="error-msg" id="errPass"><i class="fa-solid fa-circle-exclamation"></i> Password too short</div>
        </div>

        <div class="input-wrapper full-width">
          <label>Select Plan</label>
          <select id="plan">
            <option value="Standard" data-price="₦12,000" data-save="Save ₦6,000">Stream Standard – ₦12,000</option>
            <option value="Premium" data-price="₦20,000" data-save="Save ₦9,000" selected>Stream Premium – ₦20,000</option>
          </select>
        </div>
      </div>

      <div class="plan-badge">
        <div class="plan-info">
          <h4 id="plan-name">Stream Premium</h4>
          <p id="plan-price" style="font-size: 12px; color: var(--text-dim);">₦20,000 One-time</p>
        </div>
        <div class="savings-tag" id="plan-save">Save ₦9,000</div>
      </div>

      <button type="submit" class="btn-submit">Sign Up</button>
    </form>
                                
    <div class="footer-links">
        <p style="font-size: 11px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;">
        <i class="fa-solid fa-lock" style="color: var(--accent);"></i> Secure Registration | Secure Payment
      </p>
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

<script>
  const planSelect = document.getElementById("plan");
  planSelect.onchange = function() {
    const opt = this.options[this.selectedIndex];
    document.getElementById("plan-name").innerText = "Stream " + this.value;
    document.getElementById("plan-price").innerText = opt.getAttribute("data-price") + " One-time";
    document.getElementById("plan-save").innerText = opt.getAttribute("data-save");
  };
  document.getElementById("togglePass").onclick = function() {
    const pInput = document.getElementById("password");
    const icon = this.querySelector("i");
    pInput.type = pInput.type === "password" ? "text" : "password";
    icon.classList.toggle("fa-eye");
    icon.classList.toggle("fa-eye-slash");
  };
  document.getElementById("regForm").onsubmit = function(e) {
    e.preventDefault();
    let isFormValid = true;

    const inputs = [
      { id: "name", err: "errName", check: (v) => v.length > 2 },
      { id: "username", err: "errUser", check: (v) => v.length > 2 },
      { id: "phone", err: "errPhone", check: (v) => v.length >= 10 },
      { id: "email", err: "errEmail", check: (v) => v.includes("@") && v.includes(".") },
      { id: "password", err: "errPass", check: (v) => v.length >= 6 }
    ];

    inputs.forEach(inputObj => {
      const element = document.getElementById(inputObj.id);
      const errorLabel = document.getElementById(inputObj.err);
      
      if (!inputObj.check(element.value.trim())) {
        element.classList.add("invalid");
        errorLabel.style.display = "block";
        isFormValid = false;
      } else {
        element.classList.remove("invalid");
        errorLabel.style.display = "none";
      }
    });

    if (isFormValid) {
      const user = document.getElementById("username").value.trim();
      const plan = document.getElementById("plan").value;
      
      localStorage.setItem("userFullName", document.getElementById("name").value);
      
      window.location.href = `Dashboard.html`;
    }
  };
</script>
</body>
</html>
